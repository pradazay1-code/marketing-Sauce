services:
  - type: web
    name: leadpilot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn leadgen.app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DASHBOARD_PASSWORD
        sync: false
    plan: free
