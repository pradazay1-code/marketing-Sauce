name: Send Outreach Emails

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (preview only, no sending)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches: [main]
    paths:
      - '.github/triggers/send-emails.json'

permissions:
  contents: write

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send outreach emails
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python .github/scripts/send_emails.py

      - name: Commit status updates
        run: |
          git config user.name "One Vision Marketing Bot"
          git config user.email "onevisionmarketing5@gmail.com"
          git add clients/leads/outreach_drafts.json
          # Remove trigger file after processing
          git rm -f .github/triggers/send-emails.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update outreach status: emails sent"
          git push
