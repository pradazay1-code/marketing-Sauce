name: Sports Edge daily pipeline

on:
  schedule:
    # 11:00 UTC = 7am ET, 17:00 UTC = 1pm ET, 23:00 UTC = 7pm ET
    - cron: "0 11 * * *"
    - cron: "0 17 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sports-edge
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/add-sports-betting-odds-4TIbZ
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sports_edge/requirements.txt

      - name: Run pipeline
        continue-on-error: true
        run: python -m sports_edge.pipeline

      - name: Stage site bundle (always)
        run: |
          set -e
          mkdir -p site sports_edge/data/public
          if [ ! -s sports_edge/data/public/today.json ]; then
            echo '{"date":"'"$(date -u +%Y-%m-%d)"'","generated_at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'","categories":{},"totals":{},"note":"No picks this run."}' \
              > sports_edge/data/public/today.json
          fi
          if [ ! -s sports_edge/data/public/calibration.json ]; then
            echo '{"overall":{"n":0,"wins":0,"hit_rate":null,"roi":null},"by_market":{}}' \
              > sports_edge/data/public/calibration.json
          fi
          cp sports_edge/web/index.html site/index.html
          cp sports_edge/data/public/*.json site/
          # Disable Jekyll so files starting with _ are served as-is.
          touch site/.nojekyll

      - name: Commit data updates back to source branch
        run: |
          git config user.name "sports-edge-bot"
          git config user.email "sports-edge-bot@users.noreply.github.com"
          git add sports_edge/data/predictions sports_edge/data/results sports_edge/data/public sports_edge/data/odds 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "[skip ci] Auto: pipeline run $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin HEAD:claude/add-sports-betting-odds-4TIbZ || echo "Push failed (non-fatal)."
          fi

      - name: Publish site to gh-pages /sports-edge subpath
        run: |
          set -e
          REPO="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          # Pull existing gh-pages so we don't wipe other deployed content.
          if git ls-remote --heads "$REPO" gh-pages | grep -q gh-pages; then
            git clone --depth=1 --branch gh-pages "$REPO" gh-pages-checkout
          else
            mkdir gh-pages-checkout
            cd gh-pages-checkout
            git init -q -b gh-pages
            git remote add origin "$REPO"
            cd ..
          fi
          # Replace only the /sports-edge subdir.
          rm -rf gh-pages-checkout/sports-edge
          mkdir -p gh-pages-checkout/sports-edge
          cp -r site/. gh-pages-checkout/sports-edge/
          cd gh-pages-checkout
          git config user.name "sports-edge-bot"
          git config user.email "sports-edge-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No site changes to publish."
          else
            git commit -q -m "Sports Edge deploy $(date -u +%Y-%m-%dT%H:%MZ)"
            git push -q origin gh-pages
            echo "Published to gh-pages:/sports-edge/"
          fi
